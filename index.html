<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chuchubeba</title>
    <style>
        :root {
            --color-fondo: #fdf2f0;
            --color-principal: #f8d7da;
            --color-borde: #f1b0b7;
            --color-texto-titulo: #842029;
            --color-texto-cuerpo: #a94442;
            --color-tarjeta: #ffffff;
            --fuente-titulos: 'Playfair Display', serif;
            --fuente-cuerpo: 'Poppins', sans-serif;
        }

       
        body.dark-mode {
            --color-fondo: #1a1a1a;
            --color-principal: #2d1b1e;
            --color-borde: #5c3d41;
            --color-texto-titulo: #ff8fa3;
            --color-texto-cuerpo: #e0b1b7;
            --color-tarjeta: #252525;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.5s, color 0.5s, border-color 0.5s; }

        body {
            font-family: var(--fuente-cuerpo);
            background-color: var(--color-fondo);
            color: var(--color-texto-cuerpo);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: var(--color-principal);
            border: 2px solid var(--color-borde);
            color: var(--color-texto-titulo);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .mode-toggle:hover { transform: scale(1.1); }

        
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--color-fondo);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 1s ease, visibility 1s;
        }

        .intro-content { text-align: center; animation: fadeIn 2s ease; }
        .intro-content h1 { font-family: var(--fuente-titulos); font-size: 2.5rem; color: var(--color-texto-titulo); margin-bottom: 20px; }

        .btn-start {
            background-color: var(--color-tarjeta);
            color: var(--color-texto-titulo);
            border: 2px solid var(--color-borde);
            padding: 15px 40px; border-radius: 30px;
            font-size: 1.2rem; cursor: pointer;
            font-family: var(--fuente-cuerpo); font-weight: 600;
        }

        
        .main-container {
            display: flex;
            background-color: var(--color-tarjeta);
            width: 900px; max-width: 100%; height: 550px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 1px solid var(--color-borde);
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease 0.5s;
        }

        .main-container.show { opacity: 1; transform: translateY(0); }

        .sidebar {
            width: 35%; background-color: var(--color-principal);
            padding: 40px; border-right: 1px solid var(--color-borde);
            display: flex; flex-direction: column;
        }

        .sidebar h2 { font-family: var(--fuente-titulos); color: var(--color-texto-titulo); font-size: 1.8rem; margin-bottom: 30px; text-align: center; }

        .love-list { list-style: none; font-size: 1.1rem; line-height: 2; }
        .love-list li { margin-bottom: 10px; padding-left: 10px; transition: all 0.5s ease-in-out; opacity: 0.6; }
        .love-list li.active { font-weight: 600; color: var(--color-texto-titulo); transform: translateX(10px); opacity: 1; }
        .love-list li.active::before { content: '❤️ '; }

        .content-area { width: 65%; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .card-title { font-family: var(--fuente-titulos); color: var(--color-texto-titulo); font-size: 1.8rem; text-align: center; }

        .media-placeholder {
            width: 100%; height: 320px; background-color: rgba(0,0,0,0.05);
            border-radius: 8px; overflow: hidden; position: relative; border: 1px solid var(--color-borde);
        }

        #display-image { width: 100%; height: 100%; object-fit: cover; }
        #webcam-video { width: 100%; height: 100%; object-fit: cover; display: none; transform: scaleX(-1); }

        .nav-btn {
            background-color: var(--color-principal); color: var(--color-texto-titulo);
            border: 1px solid var(--color-borde); padding: 10px 25px;
            border-radius: 20px; cursor: pointer; font-weight: 600;
        }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .heart { position: absolute; color: #ff4d6d; pointer-events: none; animation: fall linear forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <button class="mode-toggle" onclick="toggleMode()" id="modeBtn">🌙</button>

    <div id="intro-overlay">
        <div class="intro-content">
            <h1>hola miamor lindo y precioso</h1>
            <p style="margin-bottom: 30px; color: var(--color-texto-cuerpo);">te quería hacer una manualidad pero me di cuenta que no tenía los materiales suficientes ALJKDALJSDL</p>
            <button class="btn-start" onclick="comenzarExperiencia()">CLIC AQUÍ SI ME AMAS MUCHO Y MORAT ES LO MÁS SUAVE ❤️</button>
        </div>
    </div>

    <div class="main-container" id="main-container">
        <div class="sidebar">
            <h2>TOP<br>cosas que amo</h2>
            <ul class="love-list" id="love-list">
                <li class="active">TOP 1</li>
                <li>TOP 2</li>
                <li>TOP 3</li>
                <li>TOP 4</li>
                <li>TOP 5</li>
                <li>TOP 6</li>
                <li>TOP 7</li>
            </ul>
        </div>

        <div class="content-area">
            <h1 class="card-title" id="card-title">Cargando...</h1>
            <div class="media-placeholder">
                <img src="foto1.jpg" id="display-image">
                <video id="webcam-video" autoplay playsinline></video>
            </div>
            <p id="image-caption" style="font-style: italic; text-align: center; color: var(--color-texto-cuerpo);"></p>
            <div class="nav-buttons" style="display: flex; gap: 20px; margin-top: 20px;">
                <button class="nav-btn" id="prev-btn" onclick="changeSlide(-1)" disabled>< Anterior</button>
                <button class="nav-btn" id="next-btn" onclick="changeSlide(1)">Siguiente ></button>
            </div>
        </div>
    </div>

    <script>
        const slides = [
            { title: "MDD", image: "mdd.png", caption: "esos 3 de ahí fueron un pilar importante en mi vida con sus canciones", listIndex: 0 },
            { title: "AMERI", image: "ameri.png", caption: "creo que no hace falta mencionar por qué", listIndex: 1 },
            { title: "LA SALCHIPAPA", image: "salchipapa.jpeg", caption: "la mejor comida rápida que existe. salchipapa > hamburguesa", listIndex: 2 },
            { title: "LOS JUEGUITOS", image: "lol.png", caption: "el shaco más duro de las tunas miamor", listIndex: 3 },
            { title: "TU ICETEX", image: "plata.jpeg", caption: "qué ICETEX tan lindo tienes preciosa", listIndex: 4 },
            { title: "PC", image: "pc.jpeg", caption: "diosmio amo mi ASUS TUF GAMING F16 RTX3050 6GB", listIndex: 5 },
            { title: "TÚ", image: "camera", caption: "por ti vendo mi pc miamor (espero que nunca llegue ese momento) ❤️", listIndex: 6 }
        ];

        let currentSlide = 0;
        let heartInterval = null;

        function toggleMode() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const btn = document.getElementById('modeBtn');
            btn.innerText = body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        function comenzarExperiencia() {
            document.getElementById('intro-overlay').style.opacity = '0';
            document.getElementById('intro-overlay').style.visibility = 'hidden';
            document.getElementById('main-container').classList.add('show');
            changeSlide(0);
        }

        function changeSlide(direction) {
            stopWebcam();
            clearInterval(heartInterval);
            currentSlide += direction;
            const data = slides[currentSlide];

            if (currentSlide === slides.length - 1) {
                invertirLista();
                startHearts();
            } else {
                restaurarLista();
            }

            document.getElementById('card-title').innerText = data.title;
            document.getElementById('image-caption').innerText = data.caption;
            
            const listItems = document.querySelectorAll('#love-list li');
            listItems.forEach(item => item.classList.remove('active'));
            listItems[data.listIndex].classList.add('active');

            const img = document.getElementById('display-image');
            const vid = document.getElementById('webcam-video');

            if (data.image === "camera") {
                img.style.display = 'none';
                vid.style.display = 'block';
                startWebcam();
                document.getElementById('next-btn').innerText = "Te amo ❤️";
            } else {
                img.style.display = 'block';
                vid.style.display = 'none';
                img.src = data.image;
                document.getElementById('next-btn').innerText = "Siguiente >";
            }

            document.getElementById('prev-btn').disabled = (currentSlide === 0);
            document.getElementById('next-btn').onclick = (currentSlide === slides.length - 1) 
                ? () => alert("Gracias por ser mi Top 1. ❤️") 
                : () => changeSlide(1);
        }

        function invertirLista() {
            const listItems = document.querySelectorAll('#love-list li');
            
            const texts = ["TOP 7: MDD", "TOP 6: AMERI", "TOP 5: LA SALCHIPAPA", "TOP 4: JUEGUITOS", "TOP 3: TU ICETEX", "TOP 2: MI PC", "⭐ TOP 1: TÚ"];
            listItems.forEach((item, i) => item.innerText = texts[i]);
        }

        function restaurarLista() {
            const listItems = document.querySelectorAll('#love-list li');
            listItems.forEach((item, i) => item.innerText = "TOP " + (i + 1));
        }

        let streamRastreador = null;
        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('webcam-video').srcObject = stream;
                streamRastreador = stream;
            } catch (err) {
                document.getElementById('image-caption').innerText = "por ti vendo mi pc miamor (espero que nunca llegue ese momento) ❤️";
            }
        }

        function stopWebcam() {
            if (streamRastreador) {
                streamRastreador.getTracks().forEach(track => track.stop());
                streamRastreador = null;
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        function startHearts() { heartInterval = setInterval(createHeart, 300); }
    </script>
</body>
</html>
